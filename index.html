<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Free Quote – Local Tradesmen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f172a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-navy text-white min-h-screen flex items-center justify-center p-4 font-sans antialiased">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700/50">
        <h1 class="text-3xl font-extrabold mb-3 text-center tracking-tight text-white leading-tight">
            Get a Free Quote – We Call You Back in Minutes
        </h1>
        <p class="text-slate-400 mb-8 text-center text-sm sm:text-base">
            Trusted local tradesmen covering [City], [County]
        </p>

        <!-- Success Message -->
        <div id="success-message" class="hidden bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 p-5 rounded-xl text-center font-medium shadow-inner">
            <svg class="w-8 h-8 mx-auto mb-2 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Thanks! We'll be in touch within 5 minutes.
        </div>

        <!-- Lead Form -->
        <form id="lead-form" class="space-y-4">
            <!-- Error Message -->
            <div id="error-message" class="hidden text-red-400 text-sm font-medium text-center bg-red-500/10 border border-red-500/20 py-3 px-4 rounded-lg">
                Something went wrong – please call us directly.
            </div>

            <div>
                <label for="name" class="sr-only">Full Name</label>
                <input type="text" id="name" placeholder="e.g. John Smith" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all shadow-inner" 
                       required>
            </div>

            <div>
                <label for="phone" class="sr-only">Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 07123 456 789" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all shadow-inner" 
                       required>
            </div>

            <div>
                <label for="postcode" class="sr-only">Postcode</label>
                <input type="text" id="postcode" placeholder="e.g. SW1A 1AA" maxlength="8" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all shadow-inner" 
                       required>
            </div>

            <button type="submit" id="submit-btn" 
                    class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold text-lg py-4 rounded-xl transition-all shadow-[0_0_15px_rgba(245,158,11,0.3)] hover:shadow-[0_0_25px_rgba(245,158,11,0.5)] transform hover:-translate-y-0.5 flex justify-center items-center mt-2">
                Get My Free Quote &rarr;
            </button>

            <p class="text-xs text-slate-400 text-center mt-5 flex items-center justify-center gap-1.5">
                <span>🔒</span> No spam. No hard sell. Local tradesmen only.
            </p>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('lead-form');
            const nameInput = document.getElementById('name');
            const phoneInput = document.getElementById('phone');
            const postcodeInput = document.getElementById('postcode');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const submitBtn = document.getElementById('submit-btn');

            // Auto-uppercase postcode
            postcodeInput.addEventListener('input', function(e) {
                this.value = this.value.toUpperCase();
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Reset error state
                errorMessage.classList.add('hidden');
                
                // Get sanitized values
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim().replace(/\s+/g, '');
                const postcode = postcodeInput.value.trim();

                // Validation
                if (!name || !phone || !postcode) {
                    showError('All fields are required.');
                    return;
                }

                if (!phone.startsWith('0') && !phone.startsWith('+44')) {
                    showError('Phone number must start with 0 or +44.');
                    return;
                }

                if (postcode.replace(/\s+/g, '').length < 5) {
                    showError('Please enter a valid UK postcode.');
                    return;
                }

                // Prepare payload
                const payload = {
                    name: name,
                    phone: phone,
                    postcode: postcode
                };

                // UI Loading state
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Processing...
                `;
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

                try {
                    const response = await fetch('https://primary-production-58a3.up.railway.app/webhook-test/a4937a6c-9dcf-4db8-9399-56cdfc6c7917', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        form.classList.add('hidden');
                        successMessage.classList.remove('hidden');
                    } else {
                        throw new Error('Server returned non-2xx status');
                    }
                } catch (error) {
                    showError('Something went wrong – please call us directly.');
                } finally {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            });

            function showError(msg) {
                errorMessage.textContent = msg;
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
